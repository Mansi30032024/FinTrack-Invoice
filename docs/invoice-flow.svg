<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="1000" viewBox="0 0 1700 1000">
  <defs>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="13" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L13,5 z" fill="#111827" />
    </marker>
    <style>
      .box {
        fill: #ffffff;
        stroke: #111827;
        stroke-width: 1.5;
      }
      .soft {
        fill: #f8fafc;
        stroke: #334155;
        stroke-width: 1.5;
      }
      .user {
        fill: none;
        stroke: #1f2937;
        stroke-width: 4;
      }
      .line {
        fill: none;
        stroke: #111827;
        stroke-width: 1.8;
        marker-end: url(#arrow);
      }
      .plain-line {
        fill: none;
        stroke: #111827;
        stroke-width: 1.5;
      }
      .title {
        fill: #111827;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 30px;
        font-weight: 700;
      }
      .label {
        fill: #111827;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 15px;
        font-weight: 700;
      }
      .small {
        fill: #111827;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 14px;
      }
      .muted {
        fill: #475569;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 13px;
      }
    </style>
  </defs>

  <rect x="0" y="0" width="1700" height="1000" fill="#ffffff" />
  <text x="850" y="48" text-anchor="middle" class="title">Invoice Generator Application Flow</text>

  <circle cx="105" cy="165" r="24" class="user" />
  <path d="M63 238 C66 194, 145 194, 148 238 Z" class="user" />
  <text x="105" y="278" text-anchor="middle" class="small">User</text>

  <rect x="330" y="95" width="210" height="78" rx="4" class="box" />
  <text x="435" y="140" text-anchor="middle" class="small">Signup Page</text>

  <rect x="330" y="230" width="210" height="78" rx="4" class="box" />
  <text x="435" y="275" text-anchor="middle" class="small">Login Page</text>

  <path d="M150 145 L240 145 L240 134 L330 134" class="line" />
  <text x="230" y="105" text-anchor="middle" class="label">POST /user/signup</text>

  <path d="M150 232 L240 232 L240 269 L330 269" class="line" />
  <text x="230" y="330" text-anchor="middle" class="label">POST /user/login</text>

  <rect x="690" y="160" width="230" height="88" rx="4" class="soft" />
  <text x="805" y="195" text-anchor="middle" class="small">JWT Token</text>
  <text x="805" y="220" text-anchor="middle" class="muted">Saved in localStorage</text>

  <path d="M540 134 L615 134 L615 184 L690 184" class="line" />
  <path d="M540 269 L615 269 L615 224 L690 224" class="line" />

  <rect x="1080" y="160" width="230" height="88" rx="4" class="box" />
  <text x="1195" y="195" text-anchor="middle" class="small">Dashboard</text>
  <text x="1195" y="220" text-anchor="middle" class="muted">Protected React View</text>

  <path d="M920 204 L1080 204" class="line" />
  <text x="960" y="185" class="label">Redirect after auth</text>

  <line x1="1195" y1="248" x2="1195" y2="885" class="plain-line" />

  <rect x="470" y="365" width="240" height="82" rx="4" class="box" />
  <text x="590" y="397" text-anchor="middle" class="small">Dashboard Summary</text>
  <text x="590" y="421" text-anchor="middle" class="muted">cards and totals</text>
  <path d="M1195 406 L710 406" class="line" />
  <text x="952" y="382" text-anchor="middle" class="label">GET /invoice/summary/count</text>

  <rect x="1450" y="335" width="230" height="82" rx="4" class="box" />
  <text x="1565" y="367" text-anchor="middle" class="small">Client Form</text>
  <text x="1565" y="391" text-anchor="middle" class="muted">add billing client</text>
  <path d="M1195 376 L1450 376" class="line" />
  <text x="1322" y="352" text-anchor="middle" class="label">POST /client</text>

  <rect x="1450" y="485" width="230" height="82" rx="4" class="box" />
  <text x="1565" y="517" text-anchor="middle" class="small">Client List</text>
  <text x="1565" y="541" text-anchor="middle" class="muted">used by invoices</text>
  <path d="M1195 526 L1450 526" class="line" />
  <text x="1322" y="502" text-anchor="middle" class="label">GET /client</text>

  <rect x="470" y="575" width="240" height="82" rx="4" class="box" />
  <text x="590" y="607" text-anchor="middle" class="small">Invoice Form</text>
  <text x="590" y="631" text-anchor="middle" class="muted">items, tax, discount</text>
  <path d="M1195 616 L710 616" class="line" />
  <text x="952" y="592" text-anchor="middle" class="label">POST /invoice</text>

  <rect x="1450" y="635" width="230" height="82" rx="4" class="box" />
  <text x="1565" y="667" text-anchor="middle" class="small">Invoice Table</text>
  <text x="1565" y="691" text-anchor="middle" class="muted">view all invoices</text>
  <path d="M1195 676 L1450 676" class="line" />
  <text x="1322" y="652" text-anchor="middle" class="label">GET /invoice</text>

  <rect x="470" y="785" width="240" height="82" rx="4" class="box" />
  <text x="590" y="817" text-anchor="middle" class="small">Status Update</text>
  <text x="590" y="841" text-anchor="middle" class="muted">draft, sent, paid</text>
  <path d="M1195 826 L710 826" class="line" />
  <text x="952" y="802" text-anchor="middle" class="label">PUT /invoice/status/:invoiceID</text>

  <rect x="1450" y="785" width="230" height="82" rx="4" class="box" />
  <text x="1565" y="817" text-anchor="middle" class="small">Delete Invoice</text>
  <text x="1565" y="841" text-anchor="middle" class="muted">remove record</text>
  <path d="M1195 826 L1450 826" class="line" />
  <text x="1322" y="802" text-anchor="middle" class="label">DELETE /invoice/:invoiceID</text>
</svg>
